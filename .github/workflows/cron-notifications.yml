name: Send Match Reminders

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger notification endpoint
        run: |
          curl -sf "${{ secrets.VERCEL_URL }}/api/cron/notifications?key=${{ secrets.CRON_SECRET }}"